# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.1.5.20260322"

package:
  name: types-openpyxl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/types-openpyxl/types_openpyxl-${{ version }}.tar.gz
  sha256: a61d66ebe1e49697853c6db8e0929e1cda2c96755e71fb676ed7fc48dfdcf697

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - package_contents:
      site_packages:
        - openpyxl-stubs/__init__.pyi
  - requirements:
      run:
        - mypy
        - openpyxl
        - python ${{ python_min }}.*
    script:
      - mypy -p openpyxl

about:
  summary: Typing stubs for openpyxl
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/types-openpyxl
  repository: https://github.com/python/typeshed/tree/main/stubs/openpyxl/openpyxl

extra:
  recipe-maintainers:
    - bollwyvl
    - conda-forge/mypy
